repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]  # GitHub Actions YAML uses some tags pyyaml doesn't load by default

  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: [--profile, black]

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: [--config=.flake8]
        files: ^ragfallback/

# mypy intentionally not run as a pre-commit hook — see .github/workflows/lint.yml
# for why it's CI-advisory only rather than a local blocking hook.
