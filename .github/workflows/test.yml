name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Unit + integration tests ───────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[faiss,chroma,huggingface,hybrid]"
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: pytest tests/unit/ -v --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        run: pytest tests/unit/ --cov=ragfallback --cov-report=xml

  # ── Job 2: MLOps regression gate ──────────────────────────────────────────
  # Runs on every push to main. Uses real SQuAD data + heuristic eval
  # (no LLM API keys needed). Quality metrics use a 5% gate; P95 latency
  # uses 12% in ci_regression_gate.py to tolerate runner variance.
  mlops-regression-gate:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-${{ runner.os }}

      - name: Install MLOps dependencies
        run: |
          pip install -e ".[chroma,huggingface,real-data,mlops]"
          pip install pytest-asyncio

      - name: Build golden dataset from SQuAD (open data, CC BY-SA 4.0)
        run: |
          python examples/build_golden_dataset.py

      - name: Run MLOps regression gate
        run: |
          python examples/ci_regression_gate.py

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlops-eval-report
          path: |
            examples/baselines.json
          retention-days: 30
