<text x="60" y="584" fill="#3fb950" font-size="15" font-weight="700">ragfallback.mlops — evaluation &amp; regression gate (closes the loop back to [Operate])</text>
<text x="76" y="612" fill="#e6edf3" font-size="13">&#8226; GoldenRunner — async eval loop, recall@k / latency P95 / fallback rate</text>
<text x="76" y="632" fill="#e6edf3" font-size="13">&#8226; BaselineRegistry — compare_or_fail() raises RegressionError on &gt;5% metric drop</text>
<text x="76" y="652" fill="#e6edf3" font-size="13">&#8226; RagasHook — RAGAS when installed, heuristic fallback otherwise (zero API keys)</text>
<text x="76" y="672" fill="#e6edf3" font-size="13">&#8226; QuerySimulator — short_keyword / long_nl / ambiguous / out_of_domain stress queries</text>
<text x="76" y="692" fill="#e6edf3" font-size="13">&#8226; MLflowLogger + generate_locustfile() — experiment tracking + load testing</text>
<rect x="40" y="728" width="818.4" height="222" rx="8" fill="#161b22" stroke="#30363d"/>
<text x="60" y="756" fill="#e6edf3" font-size="16" font-weight="700">11 production failures prevented</text>
<text x="60" y="784" fill="#8b949e" font-size="12.5">Query mismatch → silent empty results</text>
<text x="469.2" y="784" fill="#8b949e" font-size="12.5">Embedding model switch corrupts index</text>
<text x="60" y="808" fill="#8b949e" font-size="12.5">Bad chunks poison retrieval silently</text>
<text x="469.2" y="808" fill="#8b949e" font-size="12.5">Chunks overflow LLM context window</text>
<text x="60" y="832" fill="#8b949e" font-size="12.5">Keyword queries fail dense retrieval</text>
<text x="469.2" y="832" fill="#8b949e" font-size="12.5">Retriever outage, no fallback path</text>
<text x="60" y="856" fill="#8b949e" font-size="12.5">Multi-step questions break single-shot RAG</text>
<text x="469.2" y="856" fill="#8b949e" font-size="12.5">Stale index serves outdated answers</text>
<text x="60" y="880" fill="#8b949e" font-size="12.5">Answer quality invisible in production</text>
<text x="469.2" y="880" fill="#8b949e" font-size="12.5">Cross-boundary answers split at chunk edge</text>
<text x="60" y="904" fill="#8b949e" font-size="12.5">Silent metric regression after a model swap</text>
