# Note: ``langchain._api.module_import.LangChainDeprecationWarning`` is not importable on
# langchain>=0.2; ``langchain_core._api.deprecation.LangChainDeprecationWarning`` + message
# lines below cover the same runtime noise.

[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    integration: tests that need chromadb, sentence-transformers, or heavy I/O
filterwarnings =
    ignore::DeprecationWarning:swig
    ignore::DeprecationWarning:importlib._bootstrap
    ignore::requests.exceptions.RequestsDependencyWarning
    ignore::langchain_core._api.deprecation.LangChainDeprecationWarning
    ignore:.*doesn't match a supported version.*:
    ignore:.*HuggingFaceEmbeddings.*deprecated.*:
    ignore:.*Ollama.*was deprecated.*:
    ignore:.*get_relevant_documents.*deprecated.*:
